# ============================================================
# 日志管理配置文件
# ============================================================
# 配置说明: 该文件定义了项目日志系统的路径、分类和轮转策略

# ------------------------------
# 基础配置
# ------------------------------
[log.base]
# 日志根目录 (可配置)
root_path = "D:/A_George_Projects/Arduino_TB6612_TwoWheel_Car/logs"

# 日志文件扩展名
extension = ".log"

# 是否启用日志输出
enabled = true

# ------------------------------
# 分类配置
# ------------------------------
[log.categories]
# 分类名称 -> 子目录名称
changelog = "changelog"    # 每日更新日志
system    = "system"       # 系统运行日志
error     = "error"        # 错误日志
debug     = "debug"        # 调试日志

# ------------------------------
# 轮转策略配置
# ------------------------------
[log.rotation]
# 单个日志文件最大大小 (MB)
max_size_mb = 10

# 保留日志文件数量
max_files = 7

# 是否按日期轮转
daily_rotation = true

# 是否压缩归档旧日志
compress_old = true

# ------------------------------
# 权限配置
# ------------------------------
[log.permissions]
# Windows: 设置文件夹权限为读写
read_write = true

# ------------------------------
# 项目标识 (用于日志文件名)
# ------------------------------
[log.projects]
remote_controller = "rc"    # ESP32-S3遥控器固件
car_receiver      = "cr"    # ESP32-C3接收器固件
main_controller   = "mc"    # Arduino UNO主程序
documentation     = "doc"   # 文档

# ------------------------------
# 日志格式配置
# ------------------------------
[log.format]
# 时间戳格式
timestamp = "%Y-%m-%d %H:%M:%S"

# 日志条目格式
entry = "{timestamp} [{level}] [{project}] {message}"

# 级别定义
levels = ["DEBUG", "INFO", "WARNING", "ERROR", "CRITICAL"]
